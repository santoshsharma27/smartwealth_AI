# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=smartwealth
quarkus.datasource.password=smartwealth_dev
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/smartwealth
quarkus.hibernate-orm.database.generation=update

# File upload
quarkus.http.limits.max-body-size=15728640
smartwealth.upload.directory=./uploads

# AI Service
ai-service.base-url=http://localhost:8001
quarkus.rest-client.ai-service.url=${ai-service.base-url}
quarkus.rest-client.ai-service.scope=jakarta.inject.Singleton

# Fault tolerance - disabled for development
MP_Fault_Tolerance_NonFallback_Enabled=false

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173

# OpenAPI
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
