# Test profile - H2 in-memory database
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:smartwealth_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# Use random port to avoid conflicts
quarkus.http.test-port=0

# File upload - increased for test to allow our code to handle validation
# Note: quarkus.http.body.max-body-size is deprecated; use quarkus.http.limits.max-body-size
quarkus.http.limits.max-body-size=12582912
smartwealth.upload.directory=./test-uploads

# AI Service
ai-service.base-url=http://localhost:8001
quarkus.rest-client.ai-service.url=${ai-service.base-url}
quarkus.rest-client.ai-service.scope=jakarta.inject.Singleton

# Override fault tolerance for tests - reduce retry delay and timeout
smallrye.faulttolerance.global.retry.max-retries=0
smallrye.faulttolerance.global.timeout.value=2000
smallrye.faulttolerance.global.circuit-breaker.delay=1000

# Disable CORS for tests
quarkus.http.cors=false
